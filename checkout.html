<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - PI 3.147</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/cart.css">
    <style>
        /* Additional styles for standalone checkout page */
        .checkout-page {
            min-height: 100vh;
            background: #000;
            color: #fff;
            padding: 100px 20px 40px;
        }
        
        .checkout-container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .checkout-title {
            text-align: center;
            margin-bottom: 40px;
            color: #C6A969;
        }
        
        .checkout-title h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 10px;
        }
        
        .checkout-title p {
            color: #888;
        }
        
        .checkout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        
        @media (max-width: 768px) {
            .checkout-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .checkout-form-section {
            background: #111;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        
        .checkout-form-section h2 {
            color: #C6A969;
            margin-bottom: 20px;
            font-family: 'Playfair Display', serif;
        }
        
        .order-summary-section {
            background: #111;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        
        .order-summary-section h2 {
            color: #C6A969;
            margin-bottom: 20px;
            font-family: 'Playfair Display', serif;
        }
        
        .checkout-form .form-group {
            margin-bottom: 20px;
        }
        
        .checkout-form label {
            display: block;
            margin-bottom: 8px;
            color: #C6A969;
            font-weight: 500;
        }
        
        .checkout-form input,
        .checkout-form textarea {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            border-radius: 5px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
        }
        
        .checkout-form input:focus,
        .checkout-form textarea:focus {
            outline: none;
            border-color: #C6A969;
        }
        
        .checkout-form textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .checkout-form .btn {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            margin-top: 10px;
        }
        
        .order-items {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        
        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #333;
        }
        
        .order-item:last-child {
            border-bottom: none;
        }
        
        .order-item-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .order-item-info img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 5px;
        }
        
        .order-item-name {
            font-weight: 500;
        }
        
        .order-item-qty {
            color: #888;
            font-size: 0.9rem;
        }
        
        .order-item-price {
            color: #C6A969;
            font-weight: 600;
        }
        
        .order-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 2px solid #C6A969;
            margin-top: 20px;
        }
        
        .order-total-label {
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .order-total-amount {
            font-size: 1.5rem;
            color: #C6A969;
            font-weight: 700;
        }
        
        .empty-cart-message {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        .empty-cart-message a {
            color: #C6A969;
            text-decoration: underline;
        }
        
        .order-success {
            text-align: center;
            padding: 40px;
        }
        
        .order-success h2 {
            color: #C6A969;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        
        .order-success p {
            color: #888;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">&pi; 3.147</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="cart-container">
                <button id="cart-button" class="cart-button" aria-label="Open cart">
                    🛒
                    <span id="cart-count" class="cart-count">0</span>
                </button>
            </div>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
        <div class="mobile-menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </header>

    <main class="checkout-page">
        <div class="checkout-container">
            <div class="checkout-title">
                <h1>Checkout</h1>
                <p>Complete your order</p>
            </div>
            
            <div id="checkout-content">
                <div class="checkout-grid">
                    <!-- Checkout Form -->
                    <div class="checkout-form-section">
                        <h2>Shipping Details</h2>
                        <form id="checkout-form" class="checkout-form">
                            <div class="form-group">
                                <label for="customer-name">Name *</label>
                                <input type="text" id="customer-name" name="name" required placeholder="Enter your full name">
                            </div>
                            <div class="form-group">
                                <label for="customer-phone">Phone *</label>
                                <input type="tel" id="customer-phone" name="phone" required placeholder="Enter your phone number">
                            </div>
                            <div class="form-group">
                                <label for="customer-email">Email *</label>
                                <input type="email" id="customer-email" name="email" required placeholder="Enter your email address">
                            </div>
                            <div class="form-group">
                                <label for="customer-address">Address *</label>
                                <textarea id="customer-address" name="address" required placeholder="Enter your shipping address" rows="3"></textarea>
                            </div>
                            <button type="submit" class="btn">Confirm Order</button>
                        </form>
                    </div>
                    
                    <!-- Order Summary -->
                    <div class="order-summary-section">
                        <h2>Order Summary</h2>
                        <div id="order-items" class="order-items">
                            <!-- Cart items will be populated here -->
                        </div>
                        <div class="order-total">
                            <span class="order-total-label">Total</span>
                            <span id="order-total-amount" class="order-total-amount">₹0</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Success Message (hidden initially) -->
            <div id="order-success" class="order-success" style="display: none;">
                <h2>Order Confirmed!</h2>
                <p>Thank you for purchasing PI 3.147</p>
                <p style="margin-top: 20px; color: #C6A969;">Redirecting to home page...</p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 PI. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script src="js/cart.js" defer></script>
    <script src="js/checkout.js" defer></script>
    
    <script>
        // Load cart data for standalone checkout page
        document.addEventListener('DOMContentLoaded', function() {
            loadOrderSummary();
        });
        
        function loadOrderSummary() {
            const raw = localStorage.getItem('pi_cart');
            const items = raw ? JSON.parse(raw) : [];
            const container = document.getElementById('order-items');
            const totalEl = document.getElementById('order-total-amount');
            
            if (!container) return;
            
            if (!items || items.length === 0) {
                container.innerHTML = '<div class="empty-cart-message"><p>Your cart is empty</p><p><a href="shop.html">Continue Shopping</a></p></div>';
                if (totalEl) totalEl.textContent = '₹0';
                return;
            }
            
            let html = '';
            let total = 0;
            
            items.forEach(item => {
                const subtotal = item.price * item.quantity;
                total += subtotal;
                html += `
                    <div class="order-item">
                        <div class="order-item-info">
                            <img src="${item.image}" alt="${item.name}">
                            <div>
                                <div class="order-item-name">${item.name}</div>
                                <div class="order-item-qty">Qty: ${item.quantity}</div>
                            </div>
                        </div>
                        <div class="order-item-price">₹${subtotal}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            if (totalEl) totalEl.textContent = '₹' + total;
        }
    </script>
</body>
</html>
